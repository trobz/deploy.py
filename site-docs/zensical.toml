[project]
site_name = "trobz-deploy"
site_url = "https://trobz.github.io/deploy.py"
site_description = "CLI tool for deploying and managing applications on remote servers over SSH."
site_author = "Trobz"
docs_dir = "docs"
site_dir = "site"
copyright = "Copyright &copy; 2026 Trobz"
nav = [
  {Home = "index.md"},
  {"Getting Started" = "getting-started.md"},
  { "Instance Names" = "instance-names.md" },
  { "Configuration" = "configuration.md" },
  { "Hooks" = "hooks.md" },
  {"CLI Reference" = "cli-reference.md"},
]
extra_css = [
  "stylesheets/hero.css",
  "stylesheets/site.css",
]

# Three.js CDN — loaded globally so the hero scene can use it
[[project.extra_javascript]]
path = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"

# Hero particle network animation — requires Three.js above
[[project.extra_javascript]]
path = "javascripts/hero-scene.js"

[project.theme]
language = "en"
custom_dir = "overrides"
features = [
    "content.code.copy",
    "content.code.select",
    "navigation.footer",
    "navigation.indexes",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "header.autohide"
]

[project.theme.icon]
logo = "lucide/terminal"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/trobz/deploy.py"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/trobz-deploy/"
